<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1c1a">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>高位臀桥训练</title>
<style>
  :root{
    --bg:#f7f6f2; --bg-elev:#efeee9; --bg-subtle:#e6e4dc; --ink:#1c1c1a; --ink-2:#4a4a46;
    --ink-muted:#8a8983; --mid:#b5b3ab; --hairline:rgba(28,28,26,.09);
    --font:'PingFang SC','Source Han Serif SC','Noto Serif SC','Songti SC',Georgia,serif;
    --font-en:Georgia,'Times New Roman',serif;
    --font-label:-apple-system,'Segoe UI',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:var(--font);user-select:none;-webkit-user-select:none;-webkit-font-smoothing:antialiased}
  .container{
    width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:max(12px,env(safe-area-inset-top)) 24px max(28px,env(safe-area-inset-bottom));position:relative;
  }
  .header{text-align:center;padding-top:10px}
  .header .kicker{
    font-family:var(--font-label);font-size:11px;font-weight:600;letter-spacing:.28em;
    text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;
  }
  .header h1{font-size:22px;font-weight:600;letter-spacing:.04em;color:var(--ink)}
  .header .session-info{font-size:13px;color:var(--ink-muted);margin-top:8px;letter-spacing:.04em}
  .header .session-info span{color:var(--ink-2);font-weight:600}
  .circle-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;position:relative;min-height:0}
  .circle{
    position:relative;width:min(260px,70vw);height:min(260px,70vw);border-radius:50%;
    background:#ebe9e2;border:1px solid rgba(28,28,26,.10);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:background .35s,border-color .35s;
  }
  .circle.active{background:#e3e1d9;border-color:rgba(28,28,26,.16)}
  .circle .count{
    font-family:var(--font-en);font-size:min(72px,20vw);font-weight:600;line-height:1;
    color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.03em;
  }
  .circle .phase{
    font-size:min(15px,4vw);color:var(--ink-2);margin-top:8px;letter-spacing:.18em;font-weight:500;height:24px;
  }
  .circle .phase.pause-text{color:#a67c52}
  .circle .phase.done-text{color:var(--ink)}
  .circle .timer{font-size:min(13px,3.5vw);color:var(--ink-muted);margin-top:4px;height:20px}
  .glow{position:absolute;inset:-4px;border-radius:50%;opacity:0;transition:opacity .5s;pointer-events:none}
  .glow.on{opacity:1;box-shadow:0 0 0 1px rgba(28,28,26,.06)}
  .glow.pause-glow{box-shadow:0 0 0 1px rgba(166,124,82,.2)}
  .ring-svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);pointer-events:none}
  .ring-bg{fill:none;stroke:rgba(28,28,26,.08);stroke-width:2.5}
  .ring-fg{fill:none;stroke:rgba(28,28,26,.35);stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .35s ease}
  .ring-pause{stroke:rgba(166,124,82,.45)}
  .controls{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;padding-bottom:4px}
  .dots{display:flex;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--bg-subtle);transition:all .3s}
  .dot.done{background:var(--ink)}
  .action-btn{
    -webkit-appearance:none;border:none;outline:none;cursor:pointer;
    width:100%;max-width:260px;padding:13px 24px;border-radius:999px;
    background:var(--ink);color:var(--bg);font-family:var(--font);
    font-size:16px;font-weight:600;letter-spacing:.14em;transition:opacity .18s,transform .12s;
  }
  .action-btn:active{transform:scale(.985)}
  .action-btn.running{
    background:transparent;border:1px solid var(--hairline);color:var(--ink);letter-spacing:.2em;
  }
  .action-btn.paused{
    background:transparent;border:1px solid rgba(166,124,82,.35);color:#a67c52;letter-spacing:.14em;
  }
  .sub-row{display:flex;align-items:center;gap:20px}
  .test-btn{
    font-family:var(--font-label);font-size:12px;color:var(--ink-muted);letter-spacing:.06em;
    text-decoration:none;border:none;background:none;cursor:pointer;padding:6px 8px;
  }
  .test-btn:active{color:var(--ink-2)}
  .confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .confetti{position:absolute;width:5px;height:5px;border-radius:50%;opacity:0;background:var(--mid);animation:confetti-fall 1.6s ease-out forwards}
  @keyframes confetti-fall{0%{opacity:.7;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(220px) scale(.4)}}
  @media(max-width:420px){.circle{width:min(230px,68vw);height:min(230px,68vw)}}

</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <div class="kicker">Glute Bridge</div>
    <h1>高位臀桥</h1>
    <div class="session-info" id="sessionInfo">第 <span>1</span> 次 · 今日 <span id="dayTotal">0</span> 次 · 每组 50</div>
  </div>
  <div class="circle-wrap">
    <div class="circle" id="circle">
      <div class="glow" id="glow"></div>
      <svg class="ring-svg" viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="46"></circle>
        <circle class="ring-fg" id="ringFg" cx="50" cy="50" r="46" stroke-dasharray="289" stroke-dashoffset="289"></circle>
      </svg>
      <div class="count" id="countDisplay">0</div>
      <div class="phase" id="phaseLabel">准备开始</div>
      <div class="timer" id="timerLabel"></div>
    </div>
  </div>
  <div class="controls">
    <div class="dots" id="dots"><div class="dot done" data-i="0"></div><div class="dot" data-i="1"></div><div class="dot" data-i="2"></div></div>
    <button class="action-btn" id="actionBtn">开始训练</button>
    <div class="sub-row">
      <button class="test-btn" id="testBtn">测试声音</button>
      <button class="test-btn" id="resetBtn">重置今日</button>
    </div>
  </div>
</div>

function playVoice(key) {
  return new Promise(function(resolve) {
    var url = VOICES[key];
    if (!url) { setTimeout(resolve, 100); return; }
    var audio = new Audio(url);
    var done = false;
    var finish = function() { if (!done) { done = true; resolve(); } };
    var tryFallback = function() {
      if (done) return;
      // base64 播放失败时用 speechSynthesis 保底
      var textMap = {lift:'抬起', hold:'保持', lower:'放下', rest:'休息', resume:'继续'};
      var text = textMap[key] || key;
      if (window.speechSynthesis) {
        var u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN'; u.rate = 0.9; u.volume = 1;
        u.onend = finish; u.onerror = finish;
        speechSynthesis.speak(u);
        setTimeout(finish, 4000);
      } else {
        finish();
      }
    };
    audio.onended = finish;
    audio.onerror = tryFallback;
    audio.play().catch(tryFallback);
    setTimeout(finish, 6000);
  });
}

// 生成不同音调的提示音作为 hold/rest 阶段 cue
function initPhaseSounds() {
  if (VOICES.hold && VOICES.rest) return; // 已初始化
  var bl = function(freq, dur, vol) {
    var sr = 44100, n = Math.floor(sr * dur), len = sr * dur;
    var buf = new ArrayBuffer(44 + n * 2);
    var v = new DataView(buf);
    function w(s, o) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
    w('RIFF', 0); v.setUint32(4, 44 + n * 2 - 8, true);
    w('WAVE', 8); w('fmt ', 12); v.setUint32(16, 16, true);
    v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true);
    v.setUint16(32, 2, true); v.setUint16(34, 16, true);
    w('data', 36); v.setUint32(40, n * 2, true);
    for (var i = 0; i < n; i++) {
      var sample = Math.sin(2 * Math.PI * freq * i / sr);
      sample *= vol * 0.8;
      if (i > n * 0.7) sample *= 1 - ((i - n * 0.7) / (n * 0.3)); // fade out
      v.setInt16(44 + i * 2, sample * 32767, true);
    }
    return URL.createObjectURL(new Blob([buf], {type:'audio/wav'}));
  };
  VOICES.hold = bl(440, 0.25, 0.3);   // 中音A 用于"保持"
  VOICES.rest = bl(330, 0.35, 0.25);  // 低音E 用于"休息"
}

// 预热音频通道
function warmAudio() {
  try {
    const sr = 8000, n = 80, h = 44 + n;
    const buf = new ArrayBuffer(h);
    const v = new DataView(buf);
    const w = function(s, o) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    w('RIFF', 0); v.setUint32(4, h - 8, true);
    w('WAVE', 8); w('fmt ', 12); v.setUint32(16, 16, true);
    v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr, true);
    v.setUint16(32, 1, true); v.setUint16(34, 8, true);
    w('data', 36); v.setUint32(40, n, true);
    for (var i = 0; i < n; i++) v.setUint8(44 + i, 128);
    const bytes = new Uint8Array(buf); var bin = '';
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    const a = new Audio('data:audio/wav;base64,' + btoa(bin));
    a.volume = 0.01;
    a.play().catch(function(){});
  } catch(e) {}
}

function loadDay() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      const today = new Date().toDateString();
      if (d.date === today) {
        s.dayTotal = d.total || 0;
        s.session = Math.min(4, Math.floor((d.total || 0) / 50) + 1);
        return;
      }
    }
  } catch(e) {}
  s.dayTotal = 0; s.session = 1;
  saveDay();
}
function saveDay() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ date: new Date().toDateString(), total: s.dayTotal }));
  } catch(e) {}
}

// ── 音效（纯 WAV data URI） ──
function makeBeepURI(freq, dur, vol) {
  const sr = 8000; const n = Math.floor(sr * dur);
  const h = 44 + n; const buf = new ArrayBuffer(h);
  const v = new DataView(buf);
  const w = function(s, o) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w('RIFF', 0); v.setUint32(4, h - 8, true);
  w('WAVE', 8); w('fmt ', 12); v.setUint32(16, 16, true);
  v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr, true);
  v.setUint16(32, 1, true); v.setUint16(34, 8, true);
  w('data', 36); v.setUint32(40, n, true);
  for (var i = 0; i < n; i++) {
    var t = i / sr;
    var env = Math.min(1, (n - i) / (sr * 0.02));
    var sample = Math.sin(2 * Math.PI * freq * t) * (vol || 0.10) * env;
    v.setUint8(44 + i, 128 + Math.round(sample * 127));
  }
  var bytes = new Uint8Array(buf); var bin = '';
  for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return 'data:audio/wav;base64,' + btoa(bin);
}

  SOUNDS.milestone2 = makeBeepURI(700, 0.10, 0.12);
  SOUNDS.milestone3 = makeBeepURI(900, 0.10, 0.12);

}
function playSound(uri) { try { var a = new Audio(uri); a.volume = 1.0; a.play().catch(function(){}); } catch(e) {} }

  el.dayTotal.textContent = s.dayTotal;
  const pct = Math.min(s.reps / 50, 1);
  el.ring.setAttribute('stroke-dashoffset', 289 - pct * 289);
  el.dots.forEach((d, i) => { d.classList.toggle('done', i < s.session); });
  if (s.state === 'idle') { el.action.textContent = s.session > 3 ? '已完成' : '开始训练'; el.action.classList.remove('running','paused'); }
  else if (s.state === 'active') { el.action.textContent = '暂停'; el.action.classList.add('running'); el.action.classList.remove('paused'); }
  else if (s.state === 'paused') { el.action.textContent = '继续'; el.action.classList.add('paused'); el.action.classList.remove('running'); }
  else if (s.state === 'done') { el.action.textContent = '已完成'; el.action.classList.remove('running','paused'); }
}

function setPhase(name, timerText) {
  const phaseInfo = PHASES[name];
  if (!phaseInfo) {
    if (name === 'idle') { el.phase.textContent = '准备开始'; el.phase.className = 'phase'; el.timer.textContent = ''; }
    else if (name === 'done') { el.phase.textContent = s.session > 3 ? '今日训练完成!' : '本次训练完成!'; el.phase.className = 'phase done-text'; el.timer.textContent = '明天继续'; }
    else if (name === 'pause') { el.phase.textContent = '已暂停'; el.phase.className = 'phase pause-text'; el.timer.textContent = '点击继续'; }
    return;
  }
  el.phase.textContent = phaseInfo.label;
  el.phase.className = 'phase';
  el.timer.textContent = timerText || '';
}

function celebrate() {
  milestoneSound();
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  el.circle.appendChild(wrap);
  const colors = ['#b5b3ab','#8a8983','#4a4a46','#d4a574'];
  for (let i = 0; i < 12; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.top = '40%';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay = Math.random() * 0.8 + 's';
    c.style.width = (3 + Math.random()*5) + 'px';
    c.style.height = c.style.width;
    wrap.appendChild(c);
  }
  setTimeout(() => wrap.remove(), 3000);
}

// ── 训练主循环 ──
async function trainingLoop() {
  cancelLoop = false;
  s.state = 'active';
  el.circle.classList.add('active');
  el.glow.classList.add('on');
  el.glow.classList.remove('pause-glow');
  updateDisplay();

  beep(800, 0.15, 0.10);
  await sleep(200);
  beep(1000, 0.15, 0.10);

  const sessionKey = 'session' + s.session;
  await playVoice(sessionKey);
  await sleep(300);

  while (s.reps < 50 && !cancelLoop) {
    if (s.state === 'paused') { await waitForResume(); if (cancelLoop) break; }

    s.reps++;
    updateDisplay();

    currentPhaseKey = 'lift';
    if (s.state === 'paused') { await waitForResume(); if (cancelLoop) break; }
    beepRise();
    await playVoice('lift');
    setPhase('lift', '');
    await countdownWithPause(PHASES.lift.dur, 0.3);
    if (cancelLoop) break;
    if (s.state === 'paused') { await waitForResume(); if (cancelLoop) break; }

    currentPhaseKey = 'hold';
    if (s.state === 'paused') { await waitForResume(); if (cancelLoop) break; }
    setPhase('hold', '');
    await playVoice('hold');
    await countdownWithPause(PHASES.hold.dur, 0.8);
    if (cancelLoop) break;
    if (s.state === 'paused') { await waitForResume(); if (cancelLoop) break; }

    currentPhaseKey = 'lower';
    if (s.state === 'paused') { await waitForResume(); if (cancelLoop) break; }
    beepFall();
    await playVoice('lower');
    setPhase('lower', '');
    await countdownWithPause(PHASES.lower.dur, 0.3);
    if (cancelLoop) break;
    if (s.state === 'paused') { await waitForResume(); if (cancelLoop) break; }

    currentPhaseKey = 'rest';
    if (s.state === 'paused') { await waitForResume(); if (cancelLoop) break; }
    setPhase('rest', '');
    await playVoice('rest');
    await countdownWithPause(PHASES.rest.dur, 0.8);
    if (cancelLoop) break;

    checkMilestone(s.reps);

    if (s.reps === 50) {
      await playVoice('m50');
    }
  }

  finishSession();
}

function waitForResume() {
  return new Promise(resolve => {
    el.glow.classList.add('pause-glow');
    setPhase('pause');
    pauseResolver = () => {
      el.glow.classList.remove('pause-glow');
      el.glow.classList.add('on');
      resolve();
    };
  });
}

async function countdownWithPause(duration, tickEvery) {
  const start = Date.now();
  let lastTick = 0;
  while (true) {
    const elapsed = (Date.now() - start) / 1000;
    if (elapsed >= duration || cancelLoop || s.state === 'paused') {
      if (s.state === 'paused' && elapsed < duration) { el.timer.textContent = ''; return; }
      break;
    }
    const sec = Math.floor(elapsed);
    if (sec > lastTick) {
      lastTick = sec;
      if (sec < duration) beepTick();
      el.timer.textContent = Math.ceil(duration - elapsed) + 's';
    }
    await sleep(50);
  }
  el.timer.textContent = '';
}

function checkMilestone(reps) {
  if (reps === 20) { milestoneSound(); playVoice('m20'); }
  else if (reps === 40) { milestoneSound(); playVoice('m40'); }
  else if (reps === 50) { celebrate(); /* voice played once after loop check */ }
}

function finishSession() {
  s.state = 'done';
  cancelLoop = true;
  el.circle.classList.remove('active');
  el.glow.classList.remove('on');
  el.glow.classList.remove('pause-glow');
  s.session++;
  s.dayTotal += s.reps;
  saveDay();
  updateDisplay();
  setPhase('done');

  if (s.session > 3) {
    playVoice('allDone');
  } else {
    playVoice('done' + (s.session - 1));
  }
}

function togglePause() {
  if (s.state === 'active') {
    s.state = 'paused';
    el.action.textContent = '继续';
    el.action.classList.remove('running');
    el.action.classList.add('paused');
    el.glow.classList.remove('on');
    el.glow.classList.add('pause-glow');
    setPhase('pause');
    beep(700, 0.15, 0.08);
    playVoice('pause');
  } else if (s.state === 'paused') {
    s.state = 'active';
    if (currentPhaseKey) { setPhase(currentPhaseKey, ''); }
    else { el.phase.textContent = '继续训练'; el.phase.className = 'phase'; }
    el.timer.textContent = '';
    el.action.textContent = '暂停';
    el.action.classList.remove('paused');
    el.action.classList.add('running');
    el.glow.classList.remove('pause-glow');
    el.glow.classList.add('on');
    beepRise();
    playVoice('resume');
    if (pauseResolver) { const r = pauseResolver; pauseResolver = null; r(); }
  }
}

function handleStart() {
  if (s.state === 'active' || s.state === 'paused') { togglePause(); return; }
  if (s.session > 3) { setPhase('done'); return; }

  initSounds();
  warmAudio();
  playSound(SOUNDS.beepTick);

  s.reps = 0;
  s.state = 'active';
  updateDisplay();
  trainingLoop();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── 事件绑定 ──
let touchHandled = false;
el.action.addEventListener('click', function(e) { if (touchHandled) { touchHandled = false; return; } handleStart(); });
el.action.addEventListener('touchstart', function(e) { touchHandled = true; e.preventDefault(); handleStart(); }, { passive: false });
el.circle.addEventListener('click', function() {
  if (touchHandled) { touchHandled = false; return; }
  if (s.state === 'active' || s.state === 'paused') togglePause();
  else if (s.state === 'idle' && s.session <= 3) handleStart();
});
el.circle.addEventListener('touchstart', function(e) {
  touchHandled = true; e.preventDefault();
  if (s.state === 'active' || s.state === 'paused') togglePause();
  else if (s.state === 'idle' && s.session <= 3) handleStart();
}, { passive: false });
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault();
    if (s.state === 'active' || s.state === 'paused') togglePause();
    else if (s.state === 'idle' && s.session <= 3) handleStart();
  }
});

el.test.addEventListener('click', async () => {
  if (touchHandled) { touchHandled = false; return; }
  if (testing) return; testing = true;
  el.test.textContent = '测试中';
  initSounds();
  warmAudio();
  playSound(SOUNDS.beepTick);
  await sleep(300);
  beepRise(); await playVoice('lift'); await sleep(300);
  await playVoice('hold'); await sleep(300);
  beepFall(); await playVoice('lower'); await sleep(300);
  await playVoice('rest');
  await sleep(500);
  el.test.textContent = '测试声音';
  testing = false;
});
el.test.addEventListener('touchstart', async function(e) {
  touchHandled = true; e.preventDefault();
  if (testing) return; testing = true;
  el.test.textContent = '测试中';
  initSounds();
  warmAudio();
  playSound(SOUNDS.beepTick);
  await sleep(300);
  beepRise(); await playVoice('lift'); await sleep(300);
  await playVoice('hold'); await sleep(300);
  beepFall(); await playVoice('lower'); await sleep(300);
  await playVoice('rest');
  await sleep(500);
  el.test.textContent = '测试声音';
  testing = false;
}, { passive: false });

el.reset.addEventListener('click', () => {
  if (s.state === 'active' || s.state === 'paused') { cancelLoop = true; if (pauseResolver) pauseResolver(); }
  s.dayTotal = 0; s.session = 1; s.state = 'idle'; s.reps = 0; cancelLoop = true;
  el.action.textContent = '开始训练';
  el.action.classList.remove('running','paused');
  el.circle.classList.remove('active');
  el.glow.classList.remove('on','pause-glow');
  setPhase('idle');
  saveDay();
  updateDisplay();
});

// ── 初始化 ──
function init() {
  initSounds();
  loadDay();
  updateDisplay();
  setPhase('idle');
  if (window.speechSynthesis) { window.speechSynthesis.getVoices(); }
}
init();
</script>
