<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1c1a">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>4-7-8 呼吸引导</title>
<style>
  :root{
    --bg:#f7f6f2; --bg-elev:#efeee9; --bg-subtle:#e6e4dc; --ink:#1c1c1a; --ink-2:#4a4a46;
    --ink-muted:#8a8983; --mid:#b5b3ab; --hairline:rgba(28,28,26,.09);
    --font:'PingFang SC','Source Han Serif SC','Noto Serif SC','Songti SC',Georgia,serif;
    --font-en:Georgia,'Times New Roman',serif;
    --font-label:-apple-system,'Segoe UI',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);min-height:100vh;display:flex;
    font-family:var(--font);color:var(--ink);overflow:hidden;user-select:none;touch-action:manipulation;
    justify-content:center;-webkit-font-smoothing:antialiased;
  }
  .app{
    width:100%;max-width:420px;height:100vh;height:100dvh;
    display:flex;flex-direction:column;
    padding:max(40px,env(safe-area-inset-top)) env(safe-area-inset-right,24px) max(28px,env(safe-area-inset-bottom)) env(safe-area-inset-left,24px);
    position:relative;
  }
  .pattern-bar{text-align:center;padding-top:8px;padding-bottom:4px;z-index:2;position:relative}
  .pattern-bar .label{
    font-family:var(--font-label);font-size:11px;font-weight:600;
    letter-spacing:.28em;text-transform:uppercase;color:var(--ink-muted);
  }
  .hero-title{
    margin-top:10px;font-size:22px;font-weight:600;letter-spacing:.04em;text-align:center;
  }
  .hero-sub{
    margin-top:8px;font-family:var(--font-en);font-size:14px;font-style:italic;
    color:var(--ink-2);text-align:center;
  }
  .timer-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;position:relative;min-height:0}
  .circle-wrap{position:relative;width:min(220px,58vw);height:min(220px,58vw);margin-bottom:10px;flex-shrink:0}
  .circle-svg{width:100%;height:100%;transform:rotate(-90deg)}
  .circle-bg{fill:none;stroke:rgba(28,28,26,.08);stroke-width:1.5}
  .circle-progress{fill:none;stroke:rgba(28,28,26,.35);stroke-width:1.5;stroke-linecap:round;transition:stroke-dashoffset .3s}
  .circle-glow{fill:none;stroke:rgba(28,28,26,.06);stroke-width:3;filter:blur(4px);opacity:0;transition:opacity 1s}
  .circle-glow.on{opacity:1}
  .circle-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .circle-number{
    font-family:var(--font-en);font-size:56px;font-weight:600;letter-spacing:-.02em;
    color:var(--ink);line-height:1;margin-bottom:6px;font-variant-numeric:tabular-nums;
  }
  .circle-phase{
    font-size:14px;font-weight:500;letter-spacing:.18em;transition:color .4s;color:var(--ink-muted);
  }
  .circle-phase.inhale{color:var(--ink)}
  .circle-phase.hold{color:#a67c52}
  .circle-phase.exhale{color:var(--ink-2)}
  .circle-phase.idle{color:var(--ink-muted)}
  .bottom-panel{flex-shrink:0;padding-top:6px;padding-bottom:8px;display:flex;flex-direction:column;align-items:center;gap:0;z-index:2}
  .dot-row{display:flex;justify-content:center;gap:8px;margin-bottom:18px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--bg-subtle,#e6e4dc);transition:all .35s}
  .dot.active{background:var(--ink)}
  .dot.done{background:var(--mid)}
  .action-btn-wrap{position:relative;z-index:10;width:100%;max-width:260px}
  .action-btn{
    width:100%;padding:13px 18px;border-radius:999px;border:none;cursor:pointer;
    background:var(--ink);color:var(--bg);font-family:var(--font);
    font-size:16px;font-weight:600;letter-spacing:.14em;
    transition:opacity .18s,transform .12s;outline:none;
  }
  .action-btn:active{transform:scale(.985)}
  .action-btn.running{
    background:transparent;border:1px solid var(--hairline);color:var(--ink);letter-spacing:.2em;
  }
  .action-btn.paused{
    background:transparent;border:1px solid rgba(166,124,82,.35);color:#a67c52;letter-spacing:.14em;
  }
  .sub-row{display:flex;justify-content:center;gap:24px;margin-top:14px}
  .sub-text{
    font-family:var(--font-label);font-size:12px;color:var(--ink-muted);
    letter-spacing:.08em;cursor:pointer;padding:6px 10px;background:none;border:none;
  }
  .sub-text:active{color:var(--ink-2)}
  .done-screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:24px}
  .done-screen.show{display:flex}
  .done-icon{display:none}
  .done-title{font-size:26px;color:var(--ink);font-weight:500;letter-spacing:.08em}
  .done-sub{font-size:14px;color:var(--ink-2);line-height:1.7;text-align:center;font-family:var(--font-en);font-style:italic}
  .hidden{display:none!important}
  @media(max-height:640px){
    .app{padding-top:24px}
    .circle-wrap{width:170px;height:170px}
    .circle-number{font-size:44px}
    .hero-title{font-size:18px}
  }

</style>
</head>
<body>
<div class="app" id="app">
  <div class="pattern-bar">
    <div class="label">4 · 7 · 8 Breathing</div>
    <div class="hero-title">4-7-8 呼吸</div>
    <div class="hero-sub">Calm down in four rounds</div>
  </div>
  <div class="timer-area" id="timerArea">
    <div class="circle-wrap">
      <svg class="circle-svg" viewBox="0 0 210 210">
        <circle class="circle-bg" cx="105" cy="105" r="80"></circle>
        <circle class="circle-glow" id="glowRing" cx="105" cy="105" r="80"></circle>
        <circle class="circle-progress" id="progress" cx="105" cy="105" r="80" stroke-dasharray="502.65" stroke-dashoffset="502.65"></circle>
      </svg>
      <div class="circle-inner">
        <div class="circle-number" id="timerNum">--</div>
        <div class="circle-phase idle" id="phaseLabel">准备</div>
      </div>
    </div>
  </div>
  <div class="bottom-panel" id="mainPanel">
    <div class="dot-row" id="dotRow"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="action-btn-wrap"><button class="action-btn" id="actionBtn">开始</button></div>
    <div class="sub-row"><span class="sub-text" id="testBtn">测试声音</span></div>
  </div>
  <div class="done-screen" id="doneScreen">
    <div class="done-icon"></div>
    <div class="done-title">呼吸完成</div>
    <div class="done-sub">身体已经放松下来<br>可以闭眼休息一会儿</div>
    <button class="action-btn" onclick="resetAll()" style="width:auto;border-radius:24px;padding:0 32px;font-size:14px;margin-top:8px">再来一次</button>
  </div>
</div>

// 预热：自动播放一个静音 WAV 解锁 iOS 音频通道
function warmAudio() {
  try {
    // 生成一段 10ms 的静音 WAV
    const sr = 8000, n = 80, h = 44 + n;
    const buf = new ArrayBuffer(h);
    const v = new DataView(buf);
    const w = function(s, o) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    w('RIFF', 0); v.setUint32(4, h - 8, true);
    w('WAVE', 8); w('fmt ', 12); v.setUint32(16, 16, true);
    v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr, true);
    v.setUint16(32, 1, true); v.setUint16(34, 8, true);
    w('data', 36); v.setUint32(40, n, true);
    for (var i = 0; i < n; i++) v.setUint8(44 + i, 128);
    const bytes = new Uint8Array(buf); var bin = '';
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    const silentWav = 'data:audio/wav;base64,' + btoa(bin);
    const a = new Audio(silentWav);
    a.volume = 0.01;
    a.play().catch(function(){});
  } catch(e) {}
}

// 播放嵌入语音
function playVoice(key) {
  return new Promise(function(resolve) {
    var url = VOICES[key];
    if (!url) { setTimeout(resolve, 100); return; }
    var audio = new Audio(url);
    var done = false;
    var finish = function() { if (!done) { done = true; resolve(); } };
    audio.onended = finish;
    audio.onerror = finish;
    audio.play().catch(function() {
      if (!done) { done = true; setTimeout(resolve, 200); }
    });
    // 安全超时
    setTimeout(finish, 6000);
  });
}

const s = {
  running:false, paused:false, phase:'idle', round:0, phaseElapsed:0, phaseMs:0, cancelled:false
};

const timerNum = document.getElementById('timerNum');
const phaseLabel = document.getElementById('phaseLabel');
const progress = document.getElementById('progress');
const glowRing = document.getElementById('glowRing');
const dots = document.querySelectorAll('.dot');
const actionBtn = document.getElementById('actionBtn');
const mainPanel = document.getElementById('mainPanel');
const doneScreen = document.getElementById('doneScreen');
const testBtn = document.getElementById('testBtn');

// ── 音效（纯 WAV data URI） ──
function makeBeepURI(freq, dur, vol) {
  var sr = 8000; var n = Math.floor(sr * dur);
  var h = 44 + n; var buf = new ArrayBuffer(h);
  var v = new DataView(buf);
  var w = function(s, o) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w('RIFF', 0); v.setUint32(4, h - 8, true);
  w('WAVE', 8); w('fmt ', 12); v.setUint32(16, 16, true);
  v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr, true);
  v.setUint16(32, 1, true); v.setUint16(34, 8, true);
  w('data', 36); v.setUint32(40, n, true);
  for (var i = 0; i < n; i++) {
    var t = i / sr;
    var env = Math.min(1, (n - i) / (sr * 0.02));
    var sample = Math.sin(2 * Math.PI * freq * t) * (vol || 0.10) * env;
    v.setUint8(44 + i, 128 + Math.round(sample * 127));
  }
  var bytes = new Uint8Array(buf); var bin = '';
  for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return 'data:audio/wav;base64,' + btoa(bin);
}

var SOUNDS = {};
function initSounds() {
  SOUNDS.inhale = makeBeepURI(400, 0.45, 0.20);
  SOUNDS.hold   = makeBeepURI(270, 0.40, 0.13);
  SOUNDS.exhale = makeBeepURI(500, 0.55, 0.20);
  SOUNDS.tick   = makeBeepURI(520, 0.08, 0.024);
  SOUNDS.switch = makeBeepURI(880, 0.15, 0.06);
  SOUNDS.done   = makeBeepURI(523, 0.50, 0.12);
  SOUNDS.prel1  = makeBeepURI(680, 0.20, 0.15);
  SOUNDS.prel2  = makeBeepURI(750, 0.20, 0.15);
  SOUNDS.prel3  = makeBeepURI(820, 0.20, 0.15);
}
function playSound(uri) { try { var a = new Audio(uri); a.volume = 1.0; a.play().catch(function(){}); } catch(e) {} }
function beep(type) {
  if (!SOUNDS.inhale) initSounds();
  if (type === 'inhale') { playSound(SOUNDS.inhale); return; }
  if (type === 'hold')   { playSound(SOUNDS.hold); return; }
  if (type === 'exhale') { playSound(SOUNDS.exhale); return; }
  if (type === 'tick')   { playSound(SOUNDS.tick); return; }
  if (type === 'switch') { playSound(SOUNDS.switch); return; }
  if (type === 'done')   { playSound(SOUNDS.done); return; }
}
function prelude() {
  playSound(SOUNDS.prel1);
  setTimeout(function() { playSound(SOUNDS.prel2); }, 400);
  setTimeout(function() { playSound(SOUNDS.prel3); }, 800);
}

// ── 核心流程 ──
async function run() {
  s.running = true; s.cancelled = false;
  s.paused = false;
  actionBtn.textContent = '暂停';
  actionBtn.classList.add('running');
  actionBtn.classList.remove('paused');
  glowRing.classList.add('on');

  initSounds();
  prelude();
  await sleep(700);
  if (s.cancelled) return;

  await playVoice('prep');
  await sleep(300);

  for (let r = 1; r <= ROUNDS; r++) {
    if (s.cancelled) return;
    s.round = r - 1;
    updateDots();

    // 吸气
    s.phase = 'inhale'; s.phaseMs = INHALE * 1000; s.phaseElapsed = 0;
    phaseLabel.textContent = '吸气'; phaseLabel.className = 'circle-phase inhale';
    beep('switch');
    await playVoice('inhale');
    await sleep(150);
    if (s.cancelled) return;
    await countdown(INHALE);

    // 屏气
    s.phase = 'hold'; s.phaseMs = HOLD * 1000; s.phaseElapsed = 0;
    phaseLabel.textContent = '屏气'; phaseLabel.className = 'circle-phase hold';
    beep('switch');
    await playVoice('hold');
    await sleep(100);
    if (s.cancelled) return;
    await countdown(HOLD);

    // 呼气
    s.phase = 'exhale'; s.phaseMs = EXHALE * 1000; s.phaseElapsed = 0;
    phaseLabel.textContent = '呼气'; phaseLabel.className = 'circle-phase exhale';
    beep('switch');
    await playVoice('exhale');
    await sleep(100);
    if (s.cancelled) return;
    await countdown(EXHALE);

    if (r < ROUNDS) await sleep(300);
  }

  if (!s.cancelled) {
    beep('done');
    glowRing.classList.remove('on');
    await playVoice('done');
    await sleep(600);
    showDone();
  }
}

function countdown(sec) {
  return new Promise(resolve => {
    let remaining = sec * 1000;
    let last = Date.now();
    let lastTickSec = -1;
    function tick() {
      if (s.cancelled) { resolve(); return; }
      const now = Date.now();
      const dt = now - last;
      last = now;
      if (!s.paused) {
        remaining -= dt;
        const elapsed = sec * 1000 - remaining;
        const remain = Math.max(0, Math.ceil(remaining / 1000));
        timerNum.textContent = String(remain).padStart(2, '0');
        progress.style.strokeDashoffset = CIRCUM * (1 - Math.min(elapsed / (sec * 1000), 1));
        const curSec = Math.floor(elapsed / 1000);
        if (curSec > lastTickSec && curSec > 0 && curSec <= sec) {
          lastTickSec = curSec;
          beep('tick');
        }
        if (remaining <= 0) { resolve(); return; }
      }
      requestAnimationFrame(tick);
    }
    tick();
  });
}

function updateDots() {
  dots.forEach((d, i) => {
    d.className = 'dot';
    if (i < s.round) d.classList.add('done');
    else if (i === s.round) d.classList.add('active');
  });
}

function showDone() { s.running = false; mainPanel.classList.add('hidden'); doneScreen.classList.add('show'); }

async function resetAll() {
  s.cancelled = true;
  await sleep(200);
  s.running = false; s.round = 0; s.phase = 'idle';
  timerNum.textContent = '--';
  phaseLabel.textContent = '准备'; phaseLabel.className = 'circle-phase idle';
  mainPanel.classList.remove('hidden');
  doneScreen.classList.remove('show');
  progress.style.strokeDashoffset = CIRCUM;
  glowRing.classList.remove('on');
  dots.forEach(d => d.className = 'dot');
  s.paused = false;
  actionBtn.textContent = '开始';
  actionBtn.classList.remove('running');
  actionBtn.classList.remove('paused');
}

function sleep(ms) {
  return new Promise(async resolve => {
    let left = ms;
    let last = Date.now();
    while (left > 0) {
      if (s.cancelled) { resolve(); return; }
      await new Promise(r => setTimeout(r, 40));
      const now = Date.now();
      const dt = now - last;
      last = now;
      if (!s.paused) left -= dt;
    }
    resolve();
  });
}

  await playVoice('prep');
  testBtn.textContent = '测试完成';
  setTimeout(() => { testBtn.textContent = '测试声音'; testing = false; }, 2000);
});

// ── 入口 ──
function handleStart(e) {
  if (e) e.preventDefault();
  if (s.running && !s.paused) {
    s.paused = true;
    actionBtn.textContent = '继续';
    actionBtn.classList.add('paused');
    actionBtn.classList.remove('running');
    return;
  }
  if (s.running && s.paused) {
    s.paused = false;
    actionBtn.textContent = '暂停';
    actionBtn.classList.remove('paused');
    actionBtn.classList.add('running');
    return;
  }
  warmAudio();
  initSounds();
  run();
}

actionBtn.addEventListener('click', handleStart);
actionBtn.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e); }, { passive: false });
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); actionBtn.click(); }
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden && s.running && !s.paused) {
    s.paused = true;
    actionBtn.textContent = '继续';
    actionBtn.classList.add('paused');
    actionBtn.classList.remove('running');
  }
});

initSounds();
resetAll();
</script>
</body>
</html>
